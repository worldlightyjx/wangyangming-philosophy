<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王阳明全集 · 文白对照</title>
<style>
  :root {
    --ink: #1c1712;
    --paper: #f6f0e7;
    --panel: #11100e;
    --gold: #b98b35;
    --line: #d6c5a7;
    --soft: #eee4d5;
    --soft-2: #f9f6f1;
    --muted: #6b5d49;
    --green: #5d7d52;
    --red: #8a2a2a;
    --shadow: rgba(28, 23, 18, 0.12);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: #e5dccb;
    color: var(--ink);
    font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", serif;
  }

  body {
    display: block;
    overflow-x: hidden;
    overflow-y: auto;
  }

  body.drawer-open {
    overflow: hidden;
  }

  #sidebar {
    position: fixed;
    inset: 0 auto 0 0;
    width: min(86vw, 320px);
    max-width: 320px;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    color: #f4ead8;
    border-right: 1px solid #30271d;
    transition: transform .25s cubic-bezier(0.16, 1, 0.3, 1);
    transform: translateX(-100%);
    box-shadow: 18px 0 40px rgba(0, 0, 0, 0.28);
    z-index: 20;
  }

  body.drawer-open #sidebar {
    transform: translateX(0);
  }

  #sidebarBackdrop {
    position: fixed;
    inset: 0;
    display: block;
    background: rgba(17, 16, 14, 0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
    z-index: 19;
  }

  body.drawer-open #sidebarBackdrop {
    opacity: 1;
    pointer-events: auto;
  }

  #sidebarHeader {
    padding: 20px 18px 14px;
    border-bottom: 1px solid #2f261d;
  }

  #sidebarHeader h1 {
    margin: 0 0 6px;
    font-size: 1.12rem;
    color: #f2d7a0;
    letter-spacing: .08em;
  }

  #sidebarHeader p {
    margin: 0;
    font-size: .78rem;
    color: #b9a480;
    line-height: 1.7;
  }

  #searchWrap {
    padding: 12px 16px;
    border-bottom: 1px solid #2f261d;
  }

  #searchInput {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid #4a3b2a;
    border-radius: 6px;
    background: #1a1712;
    color: #f4ead8;
    font: inherit;
    outline: none;
  }

  #searchInput::placeholder { color: #8a785f; }

  #nav {
    overflow-y: auto;
    padding: 8px 0 18px;
  }

  .navGroup {
    margin-top: 8px;
  }

  .navGroupTitle {
    padding: 10px 16px 6px;
    font-size: .72rem;
    color: var(--gold);
    letter-spacing: .15em;
  }

  .navItem {
    display: block;
    width: 100%;
    padding: 7px 16px 7px 18px;
    border: 0;
    border-left: 3px solid transparent;
    background: transparent;
    color: #e9dcc4;
    text-align: left;
    cursor: pointer;
    font: inherit;
    font-size: .88rem;
    line-height: 1.55;
  }

  .navItem small {
    display: block;
    color: #aa9573;
    font-size: .74rem;
  }

  .navItem:hover,
  .navItem.active {
    background: #1a1712;
    border-left-color: var(--gold);
  }

  #main {
    width: 100%;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(182, 157, 116, .18) 31px, rgba(182, 157, 116, .18) 32px),
      var(--paper);
  }

  #toolbar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    background: rgba(246, 240, 231, .94);
    backdrop-filter: blur(6px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  #modeSwitches {
    display: flex;
    gap: 8px;
    width: 100%;
  }

  #currentTitle {
    flex: 1 1 calc(100% - 56px);
    min-width: 0;
  }

  #currentTitle h2 {
    margin: 0;
    font-size: 1rem;
    color: var(--red);
    letter-spacing: .04em;
  }

  #currentMeta {
    margin-top: 4px;
    color: var(--muted);
    font-size: .76rem;
    line-height: 1.5;
  }

  #sidebarToggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    min-width: 44px;
    min-height: 44px;
    padding: 0 12px;
    border: 1px solid var(--gold);
    border-radius: 8px;
    background: rgba(246, 240, 231, .96);
    color: #7d5e22;
    font: inherit;
    font-size: .95rem;
    cursor: pointer;
  }

  .modeBtn {
    flex: 1 1 0;
    padding: 8px 10px;
    border: 1px solid var(--gold);
    border-radius: 5px;
    background: transparent;
    color: #7d5e22;
    cursor: pointer;
    font: inherit;
    min-height: 40px;
  }

  .modeBtn.active {
    background: var(--gold);
    color: #23180a;
    font-weight: 700;
  }

  #content {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px 40px;
  }

  #contentInner {
    max-width: none;
    margin: 0 auto;
  }

  .notice {
    margin-bottom: 18px;
    padding: 14px;
    border-left: 4px solid var(--gold);
    background: #fbf8f3;
    box-shadow: 0 2px 8px var(--shadow);
    color: var(--muted);
    line-height: 1.8;
  }

  .block {
    margin-bottom: 14px;
    border-radius: 7px;
    overflow: hidden;
    box-shadow: 0 2px 10px var(--shadow);
  }

  .wen, .bai {
    padding: 13px 14px;
    line-height: 1.9;
  }

  .wen {
    background: var(--soft-2);
    border-left: 4px solid var(--gold);
  }

  .bai {
    display: none;
    background: var(--soft);
    border-left: 4px solid var(--green);
    color: #2d3b29;
  }

  body.mode-bai .wen { display: none; }
  body.mode-bai .bai { display: block; }
  body.mode-both .bai { display: block; }

  .label {
    display: block;
    margin-bottom: 6px;
    font-size: .68rem;
    letter-spacing: .12em;
    color: var(--muted);
  }

  .bai .label { color: var(--green); }

  .block.meta .wen,
  .block.meta .bai {
    background: #f1ebdf;
    font-size: .92rem;
  }

  .block.heading .wen,
  .block.heading .bai {
    background: #fbf6ee;
  }

  .placeholder {
    color: #76856d;
    font-style: italic;
  }

  .resultMeta {
    margin-bottom: 14px;
    color: var(--muted);
    font-size: .86rem;
  }

  mark {
    background: #f2d067;
    color: inherit;
    padding: 0 2px;
    border-radius: 2px;
  }

  @media (min-width: 901px) {
    html, body {
      height: 100%;
    }

    body {
      display: flex;
      overflow: hidden;
    }

    #sidebarBackdrop,
    #sidebarToggle {
      display: none;
    }

    #sidebar {
      position: relative;
      inset: auto;
      width: 320px;
      max-width: none;
      flex-shrink: 0;
      transform: none;
      box-shadow: none;
      z-index: auto;
    }

    #main {
      min-width: 0;
      min-height: auto;
      flex: 1;
    }

    #toolbar {
      position: relative;
      top: auto;
      gap: 12px;
      padding: 14px 22px;
      flex-wrap: nowrap;
    }

    #modeSwitches {
      width: auto;
    }

    #currentTitle {
      flex: 1;
    }

    #currentTitle h2 {
      font-size: 1.1rem;
    }

    #currentMeta {
      font-size: .8rem;
      line-height: normal;
    }

    .modeBtn {
      flex: none;
      padding: 7px 12px;
    }

    #content {
      padding: 28px 28px 56px;
    }

    #contentInner {
      max-width: 980px;
    }

    .notice {
      margin-bottom: 24px;
      padding: 16px 18px;
      line-height: 1.9;
    }

    .block {
      margin-bottom: 16px;
      border-radius: 8px;
    }

    .wen, .bai {
      padding: 14px 18px;
      line-height: 2;
    }

    .label {
      font-size: .72rem;
      letter-spacing: .14em;
    }
  }

  @media (max-width: 560px) {
    #content {
      padding: 14px 10px 28px;
    }

    #contentInner {
      max-width: none;
    }

    #sidebarHeader {
      padding: 18px 16px 12px;
    }

    #searchWrap {
      padding: 10px 14px;
    }

    #searchInput {
      padding: 11px 10px;
    }

    .navGroupTitle {
      padding: 10px 14px 6px;
    }

    .navItem {
      padding: 10px 14px 10px 16px;
      font-size: .9rem;
    }

    .navItem small {
      margin-top: 3px;
      line-height: 1.5;
    }

    .wen, .bai {
      padding: 12px 12px 13px;
      font-size: .95rem;
    }
  }
</style>
<script src="data/book-index.js"></script>
</head>
<body class="mode-wen">
<div id="sidebarBackdrop" hidden></div>
<aside id="sidebar">
  <div id="sidebarHeader">
    <h1>王阳明全集</h1>
    <p>整书原文已接入，共 40 卷。<br>白话释义按卷补写中，现已补入《传习录》上中下三卷。</p>
  </div>
  <div id="searchWrap">
    <input id="searchInput" type="text" placeholder="搜索整书原文或已补白话">
  </div>
  <nav id="nav"></nav>
</aside>

<main id="main">
  <div id="toolbar">
    <button id="sidebarToggle" type="button" aria-expanded="false" aria-controls="sidebar">目录</button>
    <div id="currentTitle">
      <h2 id="titleText">载入中…</h2>
      <div id="currentMeta"></div>
    </div>
    <div id="modeSwitches">
      <button class="modeBtn active" data-mode="wen">文言</button>
      <button class="modeBtn" data-mode="bai">白话</button>
      <button class="modeBtn" data-mode="both">对照</button>
    </div>
  </div>

  <div id="content">
    <div id="contentInner"></div>
  </div>
</main>

<script>
  window.BOOK_VOLUMES = window.BOOK_VOLUMES || {};
  window.BOOK_BAIHUA = window.BOOK_BAIHUA || {};

  const navEl = document.getElementById('nav');
  const contentInner = document.getElementById('contentInner');
  const contentEl = document.getElementById('content');
  const titleText = document.getElementById('titleText');
  const currentMeta = document.getElementById('currentMeta');
  const searchInput = document.getElementById('searchInput');
  const sidebarToggle = document.getElementById('sidebarToggle');
  const sidebarBackdrop = document.getElementById('sidebarBackdrop');
  const mobileMedia = window.matchMedia('(max-width: 900px)');
  const volumeIdOrder = BOOK_INDEX.volumes.map((volume) => volume.id);
  const volumeMetaById = new Map(BOOK_INDEX.volumes.map((volume, index) => [volume.id, { volume, index }]));
  const baihuaIdSet = new Set(BOOK_INDEX.baihua_ids || ['juan01-cxl-shang', 'juan02-cxl-zhong', 'juan03-cxl-xia']);
  const scriptLoaders = new Map();
  const requestIdle = window.requestIdleCallback
    ? (callback) => window.requestIdleCallback(callback, { timeout: 1200 })
    : (callback) => window.setTimeout(callback, 250);

  let currentVolumeId = BOOK_INDEX.volumes[0]?.id || null;
  let allVolumesReadyPromise = null;
  let renderSequence = 0;

  function closeSidebar() {
    document.body.classList.remove('drawer-open');
    sidebarToggle.setAttribute('aria-expanded', 'false');
    sidebarBackdrop.hidden = true;
  }

  function openSidebar() {
    if (!mobileMedia.matches) return;
    document.body.classList.add('drawer-open');
    sidebarToggle.setAttribute('aria-expanded', 'true');
    sidebarBackdrop.hidden = false;
  }

  function toggleSidebar() {
    if (document.body.classList.contains('drawer-open')) {
      closeSidebar();
      return;
    }
    openSidebar();
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeRegExp(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function highlight(text, q) {
    if (!q) return escapeHtml(text);
    const re = new RegExp(escapeRegExp(q), 'g');
    return escapeHtml(text).replace(re, (m) => `<mark>${m}</mark>`);
  }

  function buildNav() {
    const bookTitles = {
      1: '第一册 · 语录 / 文录',
      2: '第二册 · 别录',
      3: '第三册 · 外集 / 续编',
      4: '第四册 · 年谱 / 附编'
    };

    const groups = new Map();
    for (const volume of BOOK_INDEX.volumes) {
      if (!groups.has(volume.book)) groups.set(volume.book, []);
      groups.get(volume.book).push(volume);
    }

    navEl.innerHTML = '';
    for (const [book, volumes] of groups.entries()) {
      const group = document.createElement('div');
      group.className = 'navGroup';
      group.innerHTML = `<div class="navGroupTitle">${bookTitles[book] || `第${book}册`}</div>`;

      volumes.forEach((volume) => {
        const btn = document.createElement('button');
        btn.className = 'navItem';
        btn.dataset.id = volume.id;
        btn.innerHTML = `${escapeHtml(volume.title)}<small>页 ${volume.start_page} - ${volume.end_page} · ${volume.block_count} 段</small>`;
        btn.addEventListener('click', () => {
          searchInput.value = '';
          closeSidebar();
          loadAndRenderVolume(volume.id);
        });
        group.appendChild(btn);
      });

      navEl.appendChild(group);
    }
  }

  function setActiveNav(id) {
    document.querySelectorAll('.navItem').forEach((item) => {
      item.classList.toggle('active', item.dataset.id === id);
    });
  }

  function loadScript(src, optional = false) {
    if (scriptLoaders.has(src)) return scriptLoaders.get(src);

    const loader = new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = src;
      script.async = true;
      script.onload = () => resolve(true);
      script.onerror = () => {
        script.remove();
        if (optional) {
          resolve(false);
          return;
        }
        scriptLoaders.delete(src);
        reject(new Error(`Failed to load script: ${src}`));
      };
      document.head.appendChild(script);
    });

    scriptLoaders.set(src, loader);
    return loader;
  }

  async function loadBaihua(id) {
    if (!baihuaIdSet.has(id)) return null;
    if (window.BOOK_BAIHUA[id]) return window.BOOK_BAIHUA[id];
    await loadScript(`data/baihua/${id}.js`, true);
    return window.BOOK_BAIHUA[id] || null;
  }

  function withBaihua(volume) {
    const overlay = window.BOOK_BAIHUA[volume.id];
    if (!overlay || !Array.isArray(overlay.blocks)) return volume;

    return {
      ...volume,
      blocks: volume.blocks.map((block, index) => ({
        ...block,
        bai: overlay.blocks[index] || block.bai || ''
      }))
    };
  }

  async function loadVolume(id) {
    if (window.BOOK_VOLUMES[id]) return window.BOOK_VOLUMES[id];
    await loadScript(`data/volumes/${id}.js`);
    return window.BOOK_VOLUMES[id];
  }

  async function ensureAllVolumes() {
    if (!allVolumesReadyPromise) {
      const volumeLoads = BOOK_INDEX.volumes.map((volume) => loadVolume(volume.id));
      const baihuaLoads = [...baihuaIdSet].map((id) => loadBaihua(id));
      allVolumesReadyPromise = Promise.all([...volumeLoads, ...baihuaLoads]);
    }
    await allVolumesReadyPromise;
  }

  function prefetchVolume(id) {
    if (!id) return;
    loadVolume(id).catch(() => {});
    loadBaihua(id).catch(() => {});
  }

  function prefetchAdjacentVolumes(id) {
    const meta = volumeMetaById.get(id);
    if (!meta) return;

    const neighbors = [
      volumeIdOrder[meta.index + 1],
      volumeIdOrder[meta.index - 1],
      volumeIdOrder[meta.index + 2],
    ].filter(Boolean);

    requestIdle(() => {
      neighbors.forEach((neighborId) => prefetchVolume(neighborId));
    });
  }

  function renderVolumeShell(volume) {
    titleText.textContent = volume.title;
    currentMeta.textContent = `第 ${volume.start_page} - ${volume.end_page} 页 · ${volume.block_count} 段`;
    contentInner.innerHTML = `
      <div class="notice">
        正在加载 ${escapeHtml(volume.title)}……
      </div>
    `;
  }

  function renderBlocks(blocks, query = '') {
    return blocks.map((block) => {
      const baiText = block.bai
        ? highlight(block.bai, query)
        : '<span class="placeholder">白话释义待补</span>';

      return `
        <article class="block ${block.type}">
          <section class="wen">
            <span class="label">原文 · 第 ${block.page} 页</span>
            ${highlight(block.wen, query)}
          </section>
          <section class="bai">
            <span class="label">白话释义</span>
            ${baiText}
          </section>
        </article>
      `;
    }).join('');
  }

  async function loadAndRenderVolume(id) {
    const meta = volumeMetaById.get(id)?.volume;
    const sequence = ++renderSequence;

    currentVolumeId = id;
    setActiveNav(id);
    if (meta) renderVolumeShell(meta);

    const [rawVolume] = await Promise.all([
      loadVolume(id),
      loadBaihua(id),
    ]);

    if (sequence !== renderSequence) return;

    const volume = withBaihua(rawVolume);
    titleText.textContent = volume.title;
    currentMeta.textContent = `第 ${volume.start_page} - ${volume.end_page} 页 · ${volume.block_count} 段`;
    contentInner.innerHTML = `
      <div class="notice">
        <strong>当前范围：</strong>${escapeHtml(volume.title)}。<br>
        原文按 PDF 分卷切出；白话释义按卷单独补写并即时叠加显示。
      </div>
      ${renderBlocks(volume.blocks)}
    `;
    contentEl.scrollTo({ top: 0, behavior: 'smooth' });
    prefetchAdjacentVolumes(id);
  }

  async function searchAll(query) {
    const q = query.trim();
    if (!q) {
      await loadAndRenderVolume(currentVolumeId);
      return;
    }

    titleText.textContent = `搜索：${q}`;
    currentMeta.textContent = '正在全书范围内检索…';
    contentInner.innerHTML = '<div class="notice">正在加载全书索引并搜索，请稍候…</div>';

    await ensureAllVolumes();

    const results = [];
    for (const volume of BOOK_INDEX.volumes) {
      const data = withBaihua(window.BOOK_VOLUMES[volume.id]);
      data.blocks.forEach((block) => {
        if (block.wen.includes(q) || (block.bai && block.bai.includes(q))) {
          results.push({
            volume,
            block
          });
        }
      });
    }

    currentMeta.textContent = `共找到 ${results.length} 条结果`;
    if (!results.length) {
      contentInner.innerHTML = `<div class="notice">未找到“${escapeHtml(q)}”相关内容。</div>`;
      return;
    }

    contentInner.innerHTML = `
      <div class="resultMeta">搜索范围：整书 40 卷</div>
      ${results.map(({ volume, block }) => `
        <article class="block ${block.type}">
          <section class="wen">
            <span class="label">${escapeHtml(volume.title)} · 原文 · 第 ${block.page} 页</span>
            ${highlight(block.wen, q)}
          </section>
          <section class="bai">
            <span class="label">白话释义</span>
            ${block.bai ? highlight(block.bai, q) : '<span class="placeholder">白话释义待补</span>'}
          </section>
        </article>
      `).join('')}
    `;
  }

  sidebarToggle.addEventListener('click', toggleSidebar);
  sidebarBackdrop.addEventListener('click', closeSidebar);
  mobileMedia.addEventListener('change', (event) => {
    if (!event.matches) closeSidebar();
  });
  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') closeSidebar();
  });

  document.querySelectorAll('.modeBtn').forEach((btn) => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.mode;
      document.body.classList.remove('mode-wen', 'mode-bai', 'mode-both');
      document.body.classList.add(`mode-${mode}`);
      document.querySelectorAll('.modeBtn').forEach((other) => {
        other.classList.toggle('active', other === btn);
      });
    });
  });

  let searchTimer = null;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => searchAll(searchInput.value), 250);
  });

  buildNav();
  loadAndRenderVolume(currentVolumeId);
</script>
</body>
</html>
